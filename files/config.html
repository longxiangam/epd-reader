<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Configuration Tabs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 20px );
            margin: 0;
            padding: 10px;
        }
        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
        }
        .tabs {
            display: flex;
            flex-direction: column;
            overflow-y: scroll;
            border-right: 1px solid #ccc;
            max-width: 50px; /* 宽度减小，侧边栏更窄 */
        }
        .tabs button {
            flex: 0 0 auto;
            padding: 10px;
            cursor: pointer;
            background: none;
            border: none;
            border-right: 2px solid transparent;
            font-size: 16px;
            outline: none;
            writing-mode: vertical-rl; /* 垂直文本显示 */

        }
        .tabs button.active {
            border-right: 2px solid #28a745;
            font-weight: bold;
            background-color: #f4f4f4;
        }
        .tab-content {
            display: none;
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        form {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        label {
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="password"],
        input[type="number"] {
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
        }
        input[type="submit"]:hover {
            background-color: #218838;
        }

        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .book-item span {
            flex: 1;
            word-break: break-all;
        }
        .book-item button {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 8px;
        }
        .book-item button:hover {
            background-color: #c82333;
        }
        #uploadProgress {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
        }
        #uploadBtn {
            background-color: #28a745;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 8px;
            width: 100%;
        }
        #uploadBtn:hover {
            background-color: #218838;
        }
        #uploadBtn:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }
        #bookFile {
            margin-top: 8px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab-link active" data-tab="wifi">WiFi</button>
        <button class="tab-link" data-tab="weather">天气</button>
        <button class="tab-link" data-tab="sleep">睡眠</button>
        <button class="tab-link" data-tab="books">书籍</button>
       <!-- <button class="tab-link" data-tab="timer">定时功能</button>-->

    </div>
    <div id="wifi" class="tab-content active">
        <form id="wifiForm">
            <label for="ssid">SSID:</label>
            <input type="text" id="ssid" name="ssid" required />
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required />
            <input type="submit" value="Configure" />
            <div id="wifiMessage" class="message"></div>
        </form>
    </div>
    <div id="weather" class="tab-content">
        <form id="weatherForm">
            <label for="api-key">天气API Key:</label>
            <input type="text" id="api-key" name="api-key" required />
            <label for="location">城市:</label>
            <input type="text" id="location" name="location" required />
            <input type="submit" value="保存配置" />
            <div id="weatherMessage" class="message"></div>
        </form>
    </div>
    <div id="sleep" class="tab-content">
        <form id="sleepForm">
            <label for="read-sleep-seconds">阅读睡眠时间（秒）:</label>
            <input type="number" id="read-sleep-seconds" name="read-sleep-seconds" min="0" required />
            <label for="weather-sleep-seconds">日历睡眠时间（秒）:</label>
            <input type="number" id="weather-sleep-seconds" name="weather-sleep-seconds" min="0" required />
            <input type="submit" value="保存配置" />
            <div id="sleepMessage" class="message"></div>
        </form>
        <hr style="margin:16px 0;">
        <h3 style="margin-top:0;">睡眠图片</h3>
        <div id="sleepImageInfo">检查中...</div>
        <input type="file" id="sleepImageFile" accept=".bmp" style="margin-top:8px;width:100%;box-sizing:border-box;">
        <button id="sleepImageUploadBtn" disabled style="background-color:#28a745;color:white;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:14px;margin-top:8px;width:100%;">上传睡眠图片</button>
        <button id="sleepImageDeleteBtn" style="background-color:#dc3545;color:white;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:14px;margin-top:8px;width:100%;display:none;">删除睡眠图片</button>
        <div id="sleepImageProgress" style="margin-top:8px;font-size:14px;color:#555;"></div>
        <div id="sleepImageMessage" class="message"></div>
    </div>
    <div id="books" class="tab-content">
        <h3 style="margin-top:0;">书籍列表</h3>
        <div id="bookList"></div>
        <hr style="margin:16px 0;">
        <h3>上传书籍</h3>
        <input type="file" id="bookFile" accept=".txt">
        <button id="uploadBtn" disabled>上传书籍</button>
        <div id="uploadProgress"></div>
        <div id="bookMessage" class="message"></div>
    </div>
<!--    <div id="timer" class="tab-content">
        <form action="/configure_timer" method="POST">
            <label for="start-time">Start Time:</label>
            <input type="text" id="start-time" name="start-time" required />
            <label for="end-time">End Time:</label>
            <input type="text" id="end-time" name="end-time" required />
            <input type="submit" value="Set Timer" />
        </form>
    </div>-->
</div>

<script>
    document.querySelectorAll('.tab-link').forEach(button => {
        button.addEventListener('click', () => {
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(content => content.classList.remove('active'));

            const tabs = document.querySelectorAll('.tab-link');
            tabs.forEach(tab => tab.classList.remove('active'));

            const tabId = button.getAttribute('data-tab');
            document.getElementById(tabId).classList.add('active');
            button.classList.add('active');

            if (tabId === 'books') {
                loadBooks();
            }
        });
    });

    // WiFi form submission with AJAX
    const wifiForm = document.getElementById('wifiForm');
    const wifiMessage = document.getElementById('wifiMessage');

    wifiForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const formData = new FormData(wifiForm);
        fetch('/configure_wifi', {
            method: 'POST',
            body: formData
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    wifiMessage.textContent = 'WiFi configuration saved successfully!';
                    wifiMessage.className = 'message success';
                } else {
                    wifiMessage.textContent = 'Failed to save WiFi configuration.';
                    wifiMessage.className = 'message error';
                }
                wifiMessage.style.display = 'block';
            })
            .catch(error => {
                wifiMessage.textContent = 'An error occurred: ' + error.message;
                wifiMessage.className = 'message error';
                wifiMessage.style.display = 'block';
            });
    });

    // Weather form submission with AJAX
    const weatherForm = document.getElementById('weatherForm');
    const weatherMessage = document.getElementById('weatherMessage');

    weatherForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const formData = new FormData(weatherForm);
        fetch('/configure_weather', {
            method: 'POST',
            body: formData
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    weatherMessage.textContent = '天气配置保存成功!';
                    weatherMessage.className = 'message success';
                } else {
                    weatherMessage.textContent = '保存天气配置失败.';
                    weatherMessage.className = 'message error';
                }
                weatherMessage.style.display = 'block';
            })
            .catch(error => {
                weatherMessage.textContent = '发生错误: ' + error.message;
                weatherMessage.className = 'message error';
                weatherMessage.style.display = 'block';
            });
    });

    // Sleep form submission with AJAX
    const sleepForm = document.getElementById('sleepForm');
    const sleepMessage = document.getElementById('sleepMessage');

    sleepForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const formData = new FormData(sleepForm);
        fetch('/configure_sleep', {
            method: 'POST',
            body: formData
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    sleepMessage.textContent = '睡眠配置保存成功!';
                    sleepMessage.className = 'message success';
                } else {
                    sleepMessage.textContent = '保存睡眠配置失败.';
                    sleepMessage.className = 'message error';
                }
                sleepMessage.style.display = 'block';
            })
            .catch(error => {
                sleepMessage.textContent = '发生错误: ' + error.message;
                sleepMessage.className = 'message error';
                sleepMessage.style.display = 'block';
            });
    });

    // ===== Books Management =====
    const CHUNK_SIZE = 65536;

    async function loadBooks() {
        const listEl = document.getElementById('bookList');
        listEl.innerHTML = '加载中...';
        try {
            const resp = await fetch('/books');
            const data = await resp.json();
            if (!data.books || data.books.length === 0) {
                listEl.innerHTML = '<p>暂无书籍</p>';
                return;
            }
            listEl.innerHTML = '';
            data.books.forEach(name => {
                const item = document.createElement('div');
                item.className = 'book-item';
                const span = document.createElement('span');
                span.textContent = name;
                const btn = document.createElement('button');
                btn.textContent = '删除';
                btn.onclick = () => deleteBook(name, item);
                item.appendChild(span);
                item.appendChild(btn);
                listEl.appendChild(item);
            });
        } catch (e) {
            listEl.innerHTML = '<p>加载失败: ' + e.message + '</p>';
        }
    }

    async function deleteBook(name, itemEl) {
        if (!confirm('确定删除 "' + name + '" 吗？')) return;
        try {
            const resp = await fetch('/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'name=' + encodeURIComponent(name)
            });
            const data = await resp.json();
            if (data.success) {
                itemEl.remove();
                showBookMessage('已删除: ' + name, 'success');
            } else {
                showBookMessage('删除失败: ' + (data.error || '未知错误'), 'error');
            }
        } catch (e) {
            showBookMessage('删除出错: ' + e.message, 'error');
        }
    }

    const bookFileInput = document.getElementById('bookFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadProgress = document.getElementById('uploadProgress');

    bookFileInput.addEventListener('change', () => {
        uploadBtn.disabled = !bookFileInput.files.length;
    });

    uploadBtn.addEventListener('click', async () => {
        const file = bookFileInput.files[0];
        if (!file) return;

        let fileName = file.name;
        // Ensure .txt extension
        if (!fileName.toLowerCase().endsWith('.txt')) {
            fileName += '.txt';
        }

        uploadBtn.disabled = true;
        uploadProgress.textContent = '准备上传...';

        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

        try {
            for (let i = 0; i < totalChunks; i++) {
                const start = i * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, file.size);
                const chunk = file.slice(start, end);
                const buf = await chunk.arrayBuffer();

                const resp = await fetch('/upload?name=' + encodeURIComponent(fileName) + '&chunk=' + i, {
                    method: 'POST',
                    body: buf
                });

                const data = await resp.json();
                if (!data.success) {
                    throw new Error(data.error || '上传失败');
                }

                const pct = Math.round(((i + 1) / totalChunks) * 100);
                uploadProgress.textContent = '上传进度: ' + pct + '% (' + (i + 1) + '/' + totalChunks + ')';
            }

            showBookMessage('上传成功: ' + fileName, 'success');
            uploadProgress.textContent = '';
            bookFileInput.value = '';
            uploadBtn.disabled = true;
            loadBooks();
        } catch (e) {
            showBookMessage('上传失败: ' + e.message, 'error');
        } finally {
            uploadBtn.disabled = false;
        }
    });

    function showBookMessage(text, type) {
        const el = document.getElementById('bookMessage');
        el.textContent = text;
        el.className = 'message ' + type;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    // ===== Sleep Image Management =====
    const sleepImageFile = document.getElementById('sleepImageFile');
    const sleepImageUploadBtn = document.getElementById('sleepImageUploadBtn');
    const sleepImageDeleteBtn = document.getElementById('sleepImageDeleteBtn');
    const sleepImageInfo = document.getElementById('sleepImageInfo');
    const sleepImageProgress = document.getElementById('sleepImageProgress');

    sleepImageFile.addEventListener('change', () => {
        sleepImageUploadBtn.disabled = !sleepImageFile.files.length;
    });

    async function loadSleepImageInfo() {
        try {
            const resp = await fetch('/sleep_image');
            const data = await resp.json();
            if (data.exists) {
                sleepImageInfo.textContent = '已存在睡眠图片 (' + data.size + ' 字节)';
                sleepImageDeleteBtn.style.display = 'block';
            } else {
                sleepImageInfo.textContent = '暂无睡眠图片，请上传 BMP 格式图片（最大30KB）';
                sleepImageDeleteBtn.style.display = 'none';
            }
        } catch (e) {
            sleepImageInfo.textContent = '检查失败: ' + e.message;
            sleepImageDeleteBtn.style.display = 'none';
        }
    }
    loadSleepImageInfo();

    sleepImageUploadBtn.addEventListener('click', async () => {
        const file = sleepImageFile.files[0];
        if (!file) return;
        if (file.size > 30000) {
            showSleepImageMessage('文件过大，最大支持30KB', 'error');
            return;
        }

        sleepImageUploadBtn.disabled = true;
        sleepImageProgress.textContent = '上传中...';

        try {
            const buf = await file.arrayBuffer();
            const resp = await fetch('/upload_sleep_image', {
                method: 'POST',
                body: buf
            });
            const data = await resp.json();
            if (data.success) {
                showSleepImageMessage('睡眠图片上传成功!', 'success');
                sleepImageFile.value = '';
                sleepImageUploadBtn.disabled = true;
                loadSleepImageInfo();
            } else {
                showSleepImageMessage('上传失败: ' + (data.error || '未知错误'), 'error');
            }
        } catch (e) {
            showSleepImageMessage('上传出错: ' + e.message, 'error');
        } finally {
            sleepImageUploadBtn.disabled = false;
            sleepImageProgress.textContent = '';
        }
    });

    sleepImageDeleteBtn.addEventListener('click', async () => {
        if (!confirm('确定删除睡眠图片吗？')) return;
        try {
            const resp = await fetch('/delete_sleep_image', { method: 'POST' });
            const data = await resp.json();
            if (data.success) {
                showSleepImageMessage('已删除睡眠图片', 'success');
                loadSleepImageInfo();
            } else {
                showSleepImageMessage('删除失败: ' + (data.error || '未知错误'), 'error');
            }
        } catch (e) {
            showSleepImageMessage('删除出错: ' + e.message, 'error');
        }
    });

    function showSleepImageMessage(text, type) {
        const el = document.getElementById('sleepImageMessage');
        el.textContent = text;
        el.className = 'message ' + type;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

</script>
</body>
</html>
